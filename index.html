<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="css/main.css">
  <script src="src/main.js" defer></script>
  
  <title>Interactive rating component</title>

</head>
<body>
  <!-- Rating state start -->
  <div class="card">
    <div id="rating-state" class="state-container">

      <div class="star-container">
        <img src="images/icon-star.svg" alt="" aria-hidden="true">
      </div>

      <h1>How did we do?</h1>

      <p>Please let us know how we did with your support request. All feedback is appreciated 
          to help us improve our offering!</p>

      <div class="rating-group">
        <button type="button" class="btn-rating" data-value="1">1</button>
        <button type="button" class="btn-rating" data-value="2">2</button>
        <button type="button" class="btn-rating" data-value="3">3</button>
        <button type="button" class="btn-rating" data-value="4">4</button>
        <button type="button" class="btn-rating" data-value="5">5</button>
      </div>
   
      <button id="submit-btn" type="button" class="btn-submit">Submit</button>
    </div>
    <!-- Rating state end -->

    <!-- Thank you state start -->

    <div id="thank-you-state" class="state-container hidden">
      <img src="images/illustration-thank-you.svg" alt="" aria-hidden="true" class="thank-you-img">
      <p class="selected-result">You selected <span id="rating-value">0</span> out of 5</p>

      <h2>Thank you!</h2>

      <p>We appreciate you taking the time to give a rating. If you ever need more support, 
      don’t hesitate to get in touch!</p>

      <!-- Thank you state end -->
    </div>
  </div>
</body>
</html>
